# OpenFugu eval pool — July 2026
# Models used in benchmarks/runs/2026-07-08-main

orchestrators:
  - id: openfugu
    name: openfugu
    type: router
    checkpoint: checkpoints/router/router_cma.pt
    description: Fast path — hidden-state router, single worker per turn

  - id: openfugu-ultra
    name: openfugu-ultra
    type: conductor
    checkpoint: checkpoints/conductor/conductor_final
    description: Ultra path — multi-step workflow planner

