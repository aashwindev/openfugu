# Worker pool for July 2026 frontier benchmark run
# Used by benchmarks/config/eval_july2026.yaml

router:
  checkpoint: checkpoints/router/router_cma.pt
  backbone: "Qwen/Qwen3-0.6B"
  use_heuristic_fallback: true

conductor:
  checkpoint: checkpoints/conductor/conductor_final
  base_model: "Qwen/Qwen2.5-7B-Instruct"
  max_steps: 5
  use_heuristic_fallback: true

